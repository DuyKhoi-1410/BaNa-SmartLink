# FE tinh + reverse proxy sang backend (cung mang noi bo Docker).
# Ten host "backend" = ten service trong docker-compose.

upstream backend_upstream {
    server backend:3636;
}

server {
    listen 80;
    server_name _;

    # Nen text/js/css cho nhe
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
    gzip_min_length 1024;

    root /usr/share/nginx/html;
    index index.html;

    # Cho phep body lon (upload minh chung / avatar) — khop limit 10mb ben BE
    client_max_body_size 15m;

    # ---- API thuong ----
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Chatbot RAG: streaming SSE, tat buffer + timeout dai ----
    # BE stream token dan; co the cho toi ~180s nen noi timeout rong.
    location /api/v1/rag/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ---- File tinh do BE serve (minh chung, avatar) ----
    location /uploads/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- SPA fallback: moi route ve index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
